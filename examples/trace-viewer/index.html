<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trace Viewer</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & Base                                                        */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080a;
      --bg-card: #0f0f12;
      --bg-hover: #16161a;
      --border: rgba(255, 184, 111, 0.08);
      --border-layer: rgba(255, 184, 111, 0.15);
      --text: #f5f5f4;
      --text-muted: #d5c3b5;
      --text-dim: #8a8078;
      --accent: #FFB86F;
      --success: #22c55e;
      --error: #ef4444;
      --purple: #a855f7;
      --blue: #3b82f6;
      --teal: #14b8a6;
      --pink: #ec4899;
      --amber: #f59e0b;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Loading state                                                        */
    /* ------------------------------------------------------------------ */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 16px;
      opacity: 1;
      transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; position: absolute; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: var(--text-dim); font-size: 0.85rem; }

    /* ------------------------------------------------------------------ */
    /* Error state                                                          */
    /* ------------------------------------------------------------------ */
    .error-state {
      padding: 20px;
      margin: 16px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      color: var(--error);
      font-size: 0.85rem;
    }
    .error-state strong { display: block; margin-bottom: 4px; }

    /* ------------------------------------------------------------------ */
    /* Trace container                                                      */
    /* ------------------------------------------------------------------ */
    #trace-root {
      padding: 12px;
      max-width: 600px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #trace-root.visible { opacity: 1; }

    /* ------------------------------------------------------------------ */
    /* Trace header                                                         */
    /* ------------------------------------------------------------------ */
    .trace-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .trace-status {
      font-weight: 600;
      font-size: 0.85rem;
    }
    .trace-status.ok { color: var(--success); }
    .trace-status.fail { color: var(--error); }

    .trace-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    .trace-meta span + span::before {
      content: '\00B7';
      margin: 0 6px;
      color: var(--text-dim);
    }

    .trace-priority {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      color: var(--accent);
      margin-left: auto;
    }

    .trace-error-banner {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.08);
      border-radius: 6px;
      color: var(--error);
      font-size: 0.8rem;
      width: 100%;
    }

    /* ------------------------------------------------------------------ */
    /* Layer                                                                */
    /* ------------------------------------------------------------------ */
    .layer {
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(8px);
      animation: layer-in 0.35s ease forwards;
    }
    @keyframes layer-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .layer-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 6px;
      padding-left: 2px;
    }

    .layer-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Connector line between layers */
    .layer + .layer::before {
      content: '';
      display: block;
      width: 1px;
      height: 8px;
      background: var(--border-layer);
      margin: 0 auto 10px 16px;
    }

    /* ------------------------------------------------------------------ */
    /* Task card (simple)                                                    */
    /* ------------------------------------------------------------------ */
    .task-card {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 6px;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    .task-card:hover { filter: brightness(1.15); }

    .task-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-name { font-weight: 500; }

    .task-duration {
      color: var(--text-dim);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .task-status {
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    /* ------------------------------------------------------------------ */
    /* Composite cards (fused, loop, capability)                             */
    /* ------------------------------------------------------------------ */
    .composite-card {
      border-radius: 6px;
      padding: 9px 11px;
      cursor: pointer;
      transition: all 0.15s;
      border-left-width: 3px;
      border-left-style: solid;
    }
    .composite-card:hover { filter: brightness(1.1); }

    .composite-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .composite-icon { font-size: 0.9rem; }

    .composite-label { color: var(--text); }

    .composite-badge {
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .composite-duration {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 0.72rem;
    }

    .composite-chevron {
      color: var(--text-dim);
      font-size: 0.65rem;
      transition: transform 0.2s;
    }
    .composite-card.expanded .composite-chevron {
      transform: rotate(90deg);
    }

    .composite-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, margin 0.2s ease, opacity 0.2s;
      opacity: 0;
    }
    .composite-card.expanded .composite-body {
      max-height: 500px;
      margin-top: 8px;
      opacity: 1;
    }

    .nested-list {
      padding-left: 18px;
      border-left: 2px dashed;
    }

    .nested-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .nested-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .nested-item:last-child { margin-bottom: 0; }

    .nested-connector { color: var(--text-dim); font-family: var(--mono); }

    .nested-server {
      font-size: 0.62rem;
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .nested-tool { font-family: var(--mono); }

    .nested-dur { color: var(--text-dim); }

    /* ------------------------------------------------------------------ */
    /* Footer                                                               */
    /* ------------------------------------------------------------------ */
    .trace-footer {
      margin-top: 16px;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .trace-footer .pml-logo {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Connecting to bridge...</div>
  </div>

  <div id="trace-root"></div>

  <script>
  (function () {
    "use strict";

    // -----------------------------------------------------------------------
    // Constants
    // -----------------------------------------------------------------------

    var COLORS = ["#22c55e", "#3b82f6", "#f59e0b", "#a855f7", "#14b8a6", "#ec4899"];
    var root = document.getElementById("trace-root");
    var loading = document.getElementById("loading");

    // -----------------------------------------------------------------------
    // Utility
    // -----------------------------------------------------------------------

    function el(tag, attrs, children) {
      var e = document.createElement(tag);
      if (attrs) {
        for (var k in attrs) {
          if (k === "style" && typeof attrs[k] === "object") {
            for (var s in attrs[k]) e.style[s] = attrs[k][s];
          } else if (k === "className") {
            e.className = attrs[k];
          } else if (k.startsWith("on")) {
            e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
          } else {
            e.setAttribute(k, attrs[k]);
          }
        }
      }
      if (children != null) {
        if (typeof children === "string") {
          e.textContent = children;
        } else if (Array.isArray(children)) {
          for (var i = 0; i < children.length; i++) {
            if (children[i]) e.appendChild(children[i]);
          }
        } else {
          e.appendChild(children);
        }
      }
      return e;
    }

    function colorForServer(server) {
      if (!server) return COLORS[0];
      return COLORS[server.charCodeAt(0) % COLORS.length];
    }

    function parseToolId(toolId) {
      if (!toolId) return { namespace: "unknown", action: toolId || "?" };
      var idx = toolId.indexOf(":");
      if (idx === -1) return { namespace: "std", action: toolId };
      return { namespace: toolId.slice(0, idx), action: toolId.slice(idx + 1) };
    }

    function truncate(name, max) {
      max = max || 18;
      return name.length <= max ? name : name.slice(0, max - 2) + "..";
    }

    // -----------------------------------------------------------------------
    // Render: Task card (simple)
    // -----------------------------------------------------------------------

    function renderTaskCard(task, color) {
      var parsed = parseToolId(task.tool || task.toolId);
      var c = color || colorForServer(parsed.namespace);
      var ok = task.success !== false;
      var dur = Math.round(task.durationMs || 0);

      return el("div", {
        className: "task-card",
        style: { background: c + "12", border: "1px solid " + c + "35" }
      }, [
        el("span", { className: "task-status", style: { color: ok ? "var(--success)" : "var(--error)" } },
          ok ? "\u2713" : "\u2717"),
        el("span", { className: "task-dot", style: { background: c } }),
        el("span", { className: "task-name", style: { color: c } }, truncate(parsed.action)),
        el("span", { className: "task-duration" }, dur + "ms")
      ]);
    }

    // -----------------------------------------------------------------------
    // Render: Fused task card
    // -----------------------------------------------------------------------

    function renderFusedCard(task, color) {
      var ok = task.success !== false;
      var bg = ok ? "rgba(34,197,94,0.06)" : "rgba(239,68,68,0.06)";
      var border = ok ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)";
      var ops = task.logicalOperations || [];

      var body = el("div", { className: "composite-body" }, [
        el("div", { className: "nested-list", style: { borderColor: color + "40" } },
          [el("div", { className: "nested-label" }, "Logical operations:")].concat(
            ops.map(function (op, idx) {
              var p = parseToolId(op.toolId);
              var isLast = idx === ops.length - 1;
              return el("div", { className: "nested-item" }, [
                el("span", { className: "nested-connector" }, isLast ? "\u2514\u2500" : "\u251C\u2500"),
                el("span", { className: "nested-server" }, p.namespace),
                el("span", { className: "nested-tool" }, truncate(p.action)),
                op.durationMs != null
                  ? el("span", { className: "nested-dur" }, Math.round(op.durationMs) + "ms")
                  : null
              ]);
            })
          ))
      ]);

      var card = el("div", {
        className: "composite-card",
        style: { background: bg, border: "1px solid " + border, borderLeftColor: color },
        onClick: function () { card.classList.toggle("expanded"); }
      }, [
        el("div", { className: "composite-header" }, [
          el("span", { className: "composite-icon" }, "\uD83D\uDCE6"),
          el("span", { className: "composite-label" }, "Fused (" + ops.length + " ops)"),
          el("span", { className: "composite-duration" }, Math.round(task.durationMs || 0) + "ms"),
          el("span", { className: "composite-chevron" }, "\u25B6")
        ]),
        body
      ]);

      return card;
    }

    // -----------------------------------------------------------------------
    // Render: Loop task card
    // -----------------------------------------------------------------------

    function renderLoopCard(loop) {
      var ok = loop.success !== false;
      var bg = ok ? "rgba(168,85,247,0.06)" : "rgba(239,68,68,0.06)";
      var border = ok ? "rgba(168,85,247,0.2)" : "rgba(239,68,68,0.2)";
      var c = "var(--purple)";
      var tools = loop.uniqueTools || [];
      var iterations = loop.iterations || 1;

      var loopLabels = {
        forOf: "for...of", forIn: "for...in",
        doWhile: "do...while", for: "for", while: "while"
      };
      var label = loopLabels[loop.loopType] || loop.loopType;

      var body = el("div", { className: "composite-body" }, [
        el("div", { className: "nested-list", style: { borderColor: "rgba(168,85,247,0.3)" } },
          [el("div", { className: "nested-label" }, "Pattern per iteration:")].concat(
            tools.map(function (toolId, idx) {
              var p = parseToolId(toolId);
              var isLast = idx === tools.length - 1;
              return el("div", { className: "nested-item" }, [
                el("span", { className: "nested-connector" }, isLast ? "\u2514\u2500" : "\u251C\u2500"),
                el("span", { className: "nested-server" }, p.namespace),
                el("span", { className: "nested-tool" }, truncate(p.action))
              ]);
            })
          ))
      ]);

      var card = el("div", {
        className: "composite-card",
        style: { background: bg, border: "1px solid " + border, borderLeftColor: "#a855f7" },
        onClick: function () { card.classList.toggle("expanded"); }
      }, [
        el("div", { className: "composite-header" }, [
          el("span", { className: "composite-icon" }, "\uD83D\uDD04"),
          el("span", {
            className: "composite-badge",
            style: { background: "rgba(168,85,247,0.25)", color: "#a855f7" }
          }, iterations + "x"),
          el("span", { className: "composite-label" }, label),
          loop.loopCondition
            ? el("span", {
                style: {
                  color: "var(--text-dim)", fontSize: "0.72rem", fontFamily: "var(--mono)",
                  maxWidth: "120px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                },
                title: loop.loopCondition
              }, "(" + loop.loopCondition + ")")
            : null,
          el("span", { className: "composite-duration" }, Math.round(loop.totalDurationMs || 0) + "ms"),
          el("span", { className: "composite-chevron" }, "\u25B6")
        ]),
        body
      ]);

      return card;
    }

    // -----------------------------------------------------------------------
    // Render: Capability task card
    // -----------------------------------------------------------------------

    function renderCapabilityCard(task) {
      var ok = task.success !== false;
      var bg = ok ? "rgba(255,184,111,0.06)" : "rgba(239,68,68,0.06)";
      var border = ok ? "rgba(255,184,111,0.2)" : "rgba(239,68,68,0.2)";
      var nested = task.nestedTools || [];
      var parsed = parseToolId(task.tool);
      var displayName = parsed.namespace + ":" + parsed.action;

      var body = el("div", { className: "composite-body" }, [
        nested.length > 0
          ? el("div", { className: "nested-list", style: { borderColor: "rgba(255,184,111,0.3)" } },
              [el("div", { className: "nested-label" }, "Nested DAG:")].concat(
                nested.map(function (toolId, idx) {
                  var p = parseToolId(toolId);
                  var c = colorForServer(p.namespace);
                  var isLast = idx === nested.length - 1;
                  return el("div", { className: "nested-item" }, [
                    el("span", { className: "nested-connector" }, isLast ? "\u2514\u2500" : "\u251C\u2500"),
                    el("span", { className: "task-dot", style: { background: c } }),
                    el("span", { className: "nested-tool", style: { color: c } }, truncate(p.action)),
                  ]);
                })
              ))
          : null
      ]);

      var card = el("div", {
        className: "composite-card",
        style: { background: bg, border: "1px solid " + border, borderLeftColor: "#FFB86F" },
        onClick: function () { if (nested.length > 0) card.classList.toggle("expanded"); }
      }, [
        el("div", { className: "composite-header" }, [
          el("span", { className: "composite-icon", title: task.tool }, "\uD83D\uDCE6"),
          el("span", { style: { color: "var(--accent)", fontWeight: "600" } }, displayName),
          nested.length > 0
            ? el("span", { style: { color: "var(--text-dim)", fontSize: "0.65rem" } },
                "(" + nested.length + " tasks)")
            : null,
          el("span", { className: "composite-duration" }, Math.round(task.durationMs || 0) + "ms"),
          nested.length > 0
            ? el("span", { className: "composite-chevron" }, "\u25B6")
            : null
        ]),
        body
      ]);

      return card;
    }

    // -----------------------------------------------------------------------
    // Group tasks by loop (same logic as TraceTimeline.tsx)
    // -----------------------------------------------------------------------

    function groupTasksByLoop(tasks) {
      var loopMap = {};
      var loops = [];
      var nonLoopTasks = [];

      for (var i = 0; i < tasks.length; i++) {
        var task = tasks[i];
        if (task.tool && task.tool.startsWith("loop:")) {
          var loopType = task.tool.replace("loop:", "");
          loops.push({
            loopId: task.loopId || task.taskId,
            loopType: task.loopType || loopType,
            loopCondition: task.loopCondition,
            iterations: 1,
            tasks: [task],
            uniqueTools: task.bodyTools || [],
            totalDurationMs: task.durationMs || 0,
            success: task.success !== false
          });
        } else if (task.loopId) {
          if (!loopMap[task.loopId]) loopMap[task.loopId] = [];
          loopMap[task.loopId].push(task);
        } else {
          nonLoopTasks.push(task);
        }
      }

      for (var loopId in loopMap) {
        var loopTasks = loopMap[loopId];
        var maxIter = 1;
        var toolSet = {};
        var totalMs = 0;
        var allOk = true;

        for (var j = 0; j < loopTasks.length; j++) {
          var lt = loopTasks[j];
          if ((lt.loopIteration || 1) > maxIter) maxIter = lt.loopIteration;
          toolSet[lt.tool] = true;
          totalMs += lt.durationMs || 0;
          if (lt.success === false) allOk = false;
        }

        loops.push({
          loopId: loopId,
          loopType: loopTasks[0].loopType || "for",
          loopCondition: loopTasks[0].loopCondition,
          iterations: maxIter,
          tasks: loopTasks,
          uniqueTools: Object.keys(toolSet),
          totalDurationMs: totalMs,
          success: allOk
        });
      }

      return { loops: loops, nonLoopTasks: nonLoopTasks };
    }

    // -----------------------------------------------------------------------
    // Render: Full trace
    // -----------------------------------------------------------------------

    function renderTrace(trace) {
      root.innerHTML = "";

      // Header
      var ok = trace.success !== false;
      var taskCount = (trace.taskResults || []).length;

      var metaItems = el("span", { className: "trace-meta" }, [
        el("span", null, Math.round(trace.durationMs || 0) + "ms"),
        el("span", null, taskCount + " task" + (taskCount !== 1 ? "s" : "")),
      ]);

      var headerChildren = [
        el("span", { className: "trace-status " + (ok ? "ok" : "fail") },
          ok ? "\u2705 Success" : "\u274C Failed"),
        metaItems
      ];

      if (trace.priority != null) {
        headerChildren.push(
          el("span", {
            className: "trace-priority",
            style: { background: "rgba(255,184,111," + (trace.priority * 0.3) + ")" },
            title: "TD Error priority"
          }, "P: " + Math.round(trace.priority * 100) + "%")
        );
      }

      if (!ok && trace.errorMessage) {
        headerChildren.push(
          el("div", { className: "trace-error-banner" }, trace.errorMessage)
        );
      }

      root.appendChild(el("div", { className: "trace-header" }, headerChildren));

      // Group tasks by layer
      var layerMap = {};
      var tasks = trace.taskResults || [];
      for (var i = 0; i < tasks.length; i++) {
        var layer = tasks[i].layerIndex != null ? tasks[i].layerIndex : 0;
        if (!layerMap[layer]) layerMap[layer] = [];
        layerMap[layer].push(tasks[i]);
      }

      var layerKeys = Object.keys(layerMap).map(Number).sort(function (a, b) { return a - b; });

      // Render layers
      for (var li = 0; li < layerKeys.length; li++) {
        var layerIdx = layerKeys[li];
        var layerTasks = layerMap[layerIdx];
        var parallel = layerTasks.length > 1 ? " (" + layerTasks.length + " parallel)" : "";

        var layerEl = el("div", {
          className: "layer",
          style: { animationDelay: (li * 80) + "ms" }
        }, [
          el("div", { className: "layer-label" }, "Layer " + layerIdx + parallel),
          renderLayerCards(layerTasks)
        ]);

        root.appendChild(layerEl);
      }

      // Footer
      root.appendChild(el("div", { className: "trace-footer" }, [
        el("span", { className: "pml-logo" }, "PML"),
        el("span", null, "Execution trace \u2022 Multi-tool chain visualization")
      ]));

      // Animate in
      root.classList.add("visible");
    }

    function renderLayerCards(tasks) {
      var container = el("div", { className: "layer-cards" });
      var grouped = groupTasksByLoop(tasks);

      // Loops
      for (var i = 0; i < grouped.loops.length; i++) {
        container.appendChild(renderLoopCard(grouped.loops[i]));
      }

      // Non-loop tasks
      for (var j = 0; j < grouped.nonLoopTasks.length; j++) {
        var task = grouped.nonLoopTasks[j];

        if (task.isCapabilityCall) {
          container.appendChild(renderCapabilityCard(task));
        } else if (task.isFused && task.logicalOperations) {
          var parsed = parseToolId(task.tool);
          container.appendChild(renderFusedCard(task, colorForServer(parsed.namespace)));
        } else {
          container.appendChild(renderTaskCard(task));
        }
      }

      return container;
    }

    // -----------------------------------------------------------------------
    // MCP Apps protocol — postMessage handshake
    // -----------------------------------------------------------------------

    var SDK_INITIALIZED = false;

    window.addEventListener("message", function (event) {
      var msg = event.data;
      if (!msg || msg.jsonrpc !== "2.0") return;

      // ui/notifications/tool-result — this is how we receive trace data
      if (msg.method === "ui/notifications/tool-result") {
        var content = msg.params && msg.params.content;
        if (content && content.length > 0) {
          handleTraceData(content);
        }
        return;
      }

      // ui/initialize response — SDK is ready
      if ("result" in msg && msg.result && msg.result.hostInfo) {
        SDK_INITIALIZED = true;
        loading.querySelector(".loading-text").textContent = "Waiting for trace data...";

        // Apply theme from host context
        if (msg.result.hostContext && msg.result.hostContext.theme === "light") {
          document.documentElement.style.setProperty("--bg", "#fafaf9");
          document.documentElement.style.setProperty("--bg-card", "#ffffff");
          document.documentElement.style.setProperty("--text", "#1c1917");
          document.documentElement.style.setProperty("--text-muted", "#44403c");
          document.documentElement.style.setProperty("--text-dim", "#78716c");
          document.documentElement.style.setProperty("--border", "rgba(0,0,0,0.08)");
        }
        return;
      }
    });

    function handleTraceData(content) {
      for (var i = 0; i < content.length; i++) {
        if (content[i].type === "text" && content[i].text) {
          try {
            var data = JSON.parse(content[i].text);

            // Accept either a full trace object or {trace: ...}
            var trace = data.trace || data;

            if (trace.taskResults) {
              loading.classList.add("hidden");
              renderTrace(trace);
              return;
            }
          } catch (_e) {
            // Not JSON, try showing as text
          }
        }
      }

      // If no trace found, show an error
      showError("Received data but no valid trace found in tool-result content.");
    }

    function showError(msg) {
      loading.classList.add("hidden");
      root.innerHTML = "";
      root.appendChild(el("div", { className: "error-state" }, [
        el("strong", null, "Error"),
        el("span", null, msg)
      ]));
      root.classList.add("visible");
    }

    // -----------------------------------------------------------------------
    // Initiate SDK handshake (via postMessage to parent/self)
    // -----------------------------------------------------------------------

    function initSdk() {
      var target = window.parent !== window ? window.parent : window;
      target.postMessage({
        jsonrpc: "2.0",
        id: 1,
        method: "ui/initialize",
        params: {
          protocolVersion: "2025-11-25",
          clientInfo: { name: "trace-viewer", version: "0.1.0" },
          capabilities: {}
        }
      }, "*");
    }

    // -----------------------------------------------------------------------
    // Standalone mode — demo with mock data
    // -----------------------------------------------------------------------

    var DEMO_TRACE = {
      id: "trace-demo-" + Date.now(),
      success: true,
      durationMs: 847,
      priority: 0.42,
      taskResults: [
        {
          taskId: "t1", tool: "std:discover", success: true,
          durationMs: 120, layerIndex: 0
        },
        {
          taskId: "t2", tool: "std:psql_query", success: true,
          durationMs: 230, layerIndex: 1
        },
        {
          taskId: "t3", tool: "std:http_fetch", success: true,
          durationMs: 180, layerIndex: 1
        },
        {
          taskId: "t4", tool: "code:filter", success: true,
          durationMs: 12, layerIndex: 2, isFused: true,
          logicalOperations: [
            { toolId: "code:filter", durationMs: 5 },
            { toolId: "code:map", durationMs: 4 },
            { toolId: "code:sort", durationMs: 3 }
          ]
        },
        {
          taskId: "t5", tool: "std:json_format", success: true,
          durationMs: 45, layerIndex: 3
        },
        {
          taskId: "t6", tool: "std:send_message", success: true,
          durationMs: 260, layerIndex: 4
        }
      ]
    };

    // Wait for bridge or fall back to demo
    var bridgeTimeout = null;

    window.addEventListener("mcp-bridge-ready", function () {
      if (bridgeTimeout) clearTimeout(bridgeTimeout);
      loading.querySelector(".loading-text").textContent = "Bridge connected, initializing...";
      initSdk();
    });

    // If bridge.js is injected by resource server, it will fire mcp-bridge-ready.
    // If we're standalone (opened directly), show demo after a short wait.
    bridgeTimeout = setTimeout(function () {
      if (!SDK_INITIALIZED) {
        // Try SDK init anyway (bridge.js might handle it)
        initSdk();

        // After another moment, if still no data, show demo
        setTimeout(function () {
          if (!root.classList.contains("visible")) {
            loading.classList.add("hidden");
            renderTrace(DEMO_TRACE);
          }
        }, 800);
      }
    }, 1500);

  })();
  </script>
</body>
</html>
